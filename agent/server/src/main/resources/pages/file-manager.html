<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件管理中心 - AI智能助理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: #2d3748;
            margin-bottom: 10px;
        }

        .header p {
            color: #718096;
        }

        .nav-links {
            margin-top: 15px;
        }

        .nav-links a {
            color: #667eea;
            text-decoration: none;
            margin-right: 20px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        /* 左侧控制面板 */
        .control-panel {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 700px;
        }

        .panel-header {
            padding: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .panel-header h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .panel-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .control-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .action-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #4a5568;
            font-size: 13px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #4facfe;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
        }

        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .quick-btn {
            padding: 10px 15px;
            background: #edf2f7;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.3s;
        }

        .quick-btn:hover {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
        }

        /* 聊天区域 */
        .chat-section {
            border-top: 2px solid #e2e8f0;
            padding: 15px;
            background: #f7fafc;
        }

        .chat-messages {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 12px;
        }

        .message-user {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            margin-left: 15%;
        }

        .message-bot {
            background: white;
            border: 1px solid #e2e8f0;
            margin-right: 15%;
        }

        .chat-input {
            display: flex;
            gap: 8px;
        }

        .chat-input input {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 12px;
        }

        .chat-input input:focus {
            outline: none;
            border-color: #4facfe;
        }

        .chat-input button {
            padding: 8px 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        /* 右侧文件浏览器 */
        .file-browser {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            height: 700px;
            display: flex;
            flex-direction: column;
        }

        .browser-header {
            padding: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .browser-header h2 {
            font-size: 18px;
        }

        .refresh-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .file-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .file-item {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .file-item:hover {
            border-color: #4facfe;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(79, 172, 254, 0.2);
        }

        .file-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .file-icon {
            font-size: 32px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: bold;
            color: #2d3748;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .file-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #718096;
        }

        .file-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-view {
            background: #4299e1;
            color: white;
        }

        .btn-delete {
            background: #f56565;
            color: white;
        }

        /* 文件预览模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e2e8f0;
        }

        .modal-title {
            font-size: 20px;
            color: #2d3748;
        }

        .close-btn {
            font-size: 28px;
            color: #a0aec0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .close-btn:hover {
            color: #2d3748;
        }

        .file-preview {
            background: #f7fafc;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 500px;
            overflow-y: auto;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 18px;
            color: #a0aec0;
            margin-bottom: 10px;
        }

        .empty-hint {
            font-size: 14px;
            color: #cbd5e0;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        /* 手机端适配 */
        @media screen and (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .control-panel,
            .file-browser {
                height: auto;
                min-height: 500px;
            }
        }

        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px;
                margin-bottom: 15px;
                border-radius: 12px;
            }

            .header h1 {
                font-size: 22px;
            }

            .header p {
                font-size: 13px;
            }

            .nav-links {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
            }

            .nav-links a {
                margin-right: 0;
                font-size: 13px;
                padding: 5px 10px;
                background: #f7fafc;
                border-radius: 6px;
            }

            .control-panel,
            .file-browser {
                border-radius: 12px;
                height: auto;
                min-height: 600px;
            }

            .panel-header,
            .browser-header {
                padding: 15px;
            }

            .panel-header h2,
            .browser-header h2 {
                font-size: 16px;
            }

            .control-content {
                padding: 15px;
            }

            .action-section {
                margin-bottom: 20px;
            }

            .section-title {
                font-size: 13px;
            }

            .form-group input,
            .form-group textarea {
                padding: 8px 10px;
                font-size: 13px;
            }

            .btn {
                padding: 10px 15px;
                font-size: 13px;
            }

            .quick-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .chat-messages {
                max-height: 150px;
            }

            .message {
                padding: 8px 10px;
                font-size: 11px;
            }

            .message-user {
                margin-left: 10%;
            }

            .message-bot {
                margin-right: 10%;
            }

            .chat-input input {
                padding: 8px 10px;
                font-size: 12px;
            }

            .chat-input button {
                padding: 8px 12px;
                font-size: 11px;
            }

            .file-list {
                padding: 15px;
            }

            .file-item {
                padding: 12px;
            }

            .file-icon {
                font-size: 28px;
            }

            .file-name {
                font-size: 14px;
            }

            .file-meta {
                flex-direction: column;
                gap: 5px;
            }

            .file-actions {
                flex-wrap: wrap;
            }

            .modal-content {
                width: 95%;
                margin: 10% auto;
                padding: 20px;
            }

            .modal-title {
                font-size: 18px;
            }

            .file-preview {
                font-size: 12px;
                padding: 15px;
            }
        }

        @media screen and (max-width: 480px) {
            .header h1 {
                font-size: 20px;
            }

            .nav-links a {
                font-size: 12px;
                padding: 4px 8px;
            }

            .message {
                font-size: 10px;
            }

            .file-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .file-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📁 文件管理中心</h1>
            <p>通过自然语言创建、读取和管理文件</p>
            <div class="nav-links">
                <a href="index.html">💬 智能对话</a>
                <a href="task-manager.html">📋 任务管理</a>
                <a href="weather-planner.html">🌤️ 天气出行</a>
            </div>
        </div>

        <div class="main-grid">
            <!-- 左侧：控制面板 -->
            <div class="control-panel">
                <div class="panel-header">
                    <h2>🛠️ 文件操作</h2>
                    <p>使用AI助手或直接操作</p>
                </div>

                <div class="control-content">
                    <!-- 快速创建 -->
                    <div class="action-section">
                        <div class="section-title">⚡ 快速创建文件</div>
                        <div class="form-group">
                            <label>文件名</label>
                            <input type="text" id="fileName" placeholder="例如: notes.txt">
                        </div>
                        <div class="form-group">
                            <label>文件内容</label>
                            <textarea id="fileContent" placeholder="输入文件内容..."></textarea>
                        </div>
                        <button class="btn btn-primary" onclick="createFile()">📄 创建文件</button>
                    </div>

                    <!-- 快捷操作 -->
                    <div class="action-section">
                        <div class="section-title">🎯 快捷操作</div>
                        <div class="quick-actions">
                            <button class="quick-btn" onclick="sendQuickCommand('创建文件 readme.txt 内容为项目说明文档')">
                                📝 创建README
                            </button>
                            <button class="quick-btn" onclick="sendQuickCommand('创建文件 todo.txt 内容为今日待办事项')">
                                ✅ 创建待办清单
                            </button>
                            <button class="quick-btn" onclick="sendQuickCommand('列出所有文件')">
                                📋 刷新文件列表
                            </button>
                        </div>
                    </div>

                    <!-- 使用说明 -->
                    <div class="action-section">
                        <div class="section-title">💡 使用提示</div>
                        <div style="font-size: 12px; color: #718096; line-height: 1.8;">
                            • 可以使用自然语言创建文件<br>
                            • 点击文件可查看内容<br>
                            • 支持文本文件的读写操作<br>
                            • 文件保存在服务器端
                        </div>
                    </div>
                </div>

                <!-- AI对话 -->
                <div class="chat-section">
                    <div class="chat-messages" id="chatMessages">
                        <div class="message message-bot">
                            💬 试试对我说：<br>
                            "创建文件 test.txt 内容为Hello"
                        </div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="输入指令..." 
                               onkeypress="if(event.key==='Enter') sendChat()">
                        <button onclick="sendChat()">发送</button>
                    </div>
                </div>
            </div>

            <!-- 右侧：文件浏览器 -->
            <div class="file-browser">
                <div class="browser-header">
                    <h2>📂 文件列表</h2>
                    <button class="refresh-btn" onclick="loadFiles()">🔄 刷新</button>
                </div>

                <div class="file-list" id="fileList">
                    <div class="loading">
                        <div class="spinner"></div>
                        <div>加载文件中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 文件预览模态框 -->
    <div id="previewModal" class="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">文件预览</div>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div class="file-preview" id="filePreview"></div>
        </div>
    </div>

    <script>
        let userId = localStorage.getItem('agentUserId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('agentUserId', userId);
        }

        // 创建文件
        async function createFile() {
            const fileName = document.getElementById('fileName').value.trim();
            const fileContent = document.getElementById('fileContent').value.trim();

            if (!fileName) {
                alert('请输入文件名');
                return;
            }

            const message = `创建文件 ${fileName} 内容为${fileContent || '空文件'}`;
            
            try {
                const response = await fetch('/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, message })
                });

                const result = await response.json();
                
                if (result.code === 1) {
                    alert('✅ 文件创建成功！');
                    document.getElementById('fileName').value = '';
                    document.getElementById('fileContent').value = '';
                    loadFiles(); // 刷新文件列表
                } else {
                    alert('❌ 创建失败：' + result.msg);
                }
            } catch (error) {
                alert('❌ 网络错误：' + error.message);
            }
        }

        // 加载文件列表
        async function loadFiles() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>加载文件中...</div>
                </div>
            `;

            try {
                const response = await fetch('/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, message: '列出所有文件' })
                });

                const result = await response.json();
                
                if (result.code === 1) {
                    parseAndDisplayFiles(result.data);
                } else {
                    showError('加载失败：' + result.msg);
                }
            } catch (error) {
                showError('网络错误：' + error.message);
            }
        }

        // 解析并显示文件列表
        function parseAndDisplayFiles(responseText) {
            const fileList = document.getElementById('fileList');

            if (responseText.includes('没有文件')) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">暂无文件</div>
                        <div class="empty-hint">在左侧创建你的第一个文件吧！</div>
                    </div>
                `;
                return;
            }

            // 尝试解析文件信息
            const lines = responseText.split('\n');
            let files = [];

            lines.forEach(line => {
                if (line.trim().startsWith('- ')) {
                    const match = line.match(/- (.+?)\s*\((\d+)\s*字节\)/);
                    if (match) {
                        files.push({
                            name: match[1].trim(),
                            size: parseInt(match[2])
                        });
                    }
                }
            });

            if (files.length === 0) {
                fileList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-text">暂无文件</div>
                    </div>
                `;
                return;
            }

            // 渲染文件列表
            let html = '';
            files.forEach(file => {
                const icon = getFileIcon(file.name);
                html += `
                    <div class="file-item" onclick="viewFile('${file.name}')">
                        <div class="file-header">
                            <div class="file-icon">${icon}</div>
                            <div class="file-info">
                                <div class="file-name">${file.name}</div>
                                <div class="file-meta">
                                    <span>📏 ${formatFileSize(file.size)}</span>
                                    <span>📅 刚刚</span>
                                </div>
                            </div>
                            <div class="file-actions">
                                <button class="btn btn-small btn-view" onclick="event.stopPropagation(); viewFile('${file.name}')">
                                    👁️ 查看
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            fileList.innerHTML = html;
        }

        // 获取文件图标
        function getFileIcon(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            const iconMap = {
                'txt': '📄',
                'md': '📝',
                'json': '📋',
                'csv': '📊',
                'log': '📜',
                'cfg': '⚙️',
                'conf': '⚙️'
            };
            return iconMap[ext] || '📄';
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        // 查看文件
        async function viewFile(fileName) {
            const modal = document.getElementById('previewModal');
            const modalTitle = document.getElementById('modalTitle');
            const filePreview = document.getElementById('filePreview');

            modalTitle.textContent = `📄 ${fileName}`;
            filePreview.textContent = '加载中...';
            modal.style.display = 'block';

            try {
                const response = await fetch('/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, message: `读取文件 ${fileName}` })
                });

                const result = await response.json();
                
                if (result.code === 1) {
                    // 提取文件内容
                    const contentMatch = result.data.match(/内容：\n\n([\s\S]*)/);
                    if (contentMatch) {
                        filePreview.textContent = contentMatch[1];
                    } else {
                        filePreview.textContent = result.data;
                    }
                } else {
                    filePreview.textContent = '❌ 读取失败：' + result.msg;
                }
            } catch (error) {
                filePreview.textContent = '❌ 网络错误：' + error.message;
            }
        }

        // 关闭模态框
        function closeModal(event) {
            if (!event || event.target.id === 'previewModal') {
                document.getElementById('previewModal').style.display = 'none';
            }
        }

        // 发送快捷命令
        function sendQuickCommand(command) {
            document.getElementById('chatInput').value = command;
            sendChat();
        }

        // 发送聊天消息
        async function sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            addChatMessage(message, true);
            input.value = '';

            try {
                const response = await fetch('/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, message })
                });

                const result = await response.json();
                
                if (result.code === 1) {
                    const formattedResponse = result.data.replace(/\n/g, '<br>');
                    addChatMessage(formattedResponse, false);
                    
                    // 如果涉及文件操作，刷新列表
                    if (message.includes('文件') || message.includes('创建') || message.includes('列出')) {
                        setTimeout(loadFiles, 500);
                    }
                } else {
                    addChatMessage('❌ 错误：' + result.msg, false);
                }
            } catch (error) {
                addChatMessage('❌ 网络错误：' + error.message, false);
            }
        }

        function addChatMessage(content, isUser) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'message-user' : 'message-bot'}`;
            messageDiv.innerHTML = content;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 显示错误
        function showError(message) {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">⚠️</div>
                    <div class="empty-text">${message}</div>
                    <div class="empty-hint">请稍后重试</div>
                </div>
            `;
        }

        // 页面加载时加载文件列表
        window.onload = () => {
            loadFiles();
        };
    </script>
</body>
</html>
